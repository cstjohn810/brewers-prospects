<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Dashboard · Brewers Prospect Hub</title>
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('ph-theme') || 'dark');
  </script>
  <link rel="stylesheet" href="styles/main.css">
  <style>

    /* ═══════════════════════════════════════════════════════════════════════
       PLAYER PAGE STYLES
    ═══════════════════════════════════════════════════════════════════════ */

    /* ── Hero ──────────────────────────────────────────────────────────────── */
    .player-hero {
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
      animation: fadeUp 0.35s ease both;
    }

    .back-link {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--gold); }

    .hero-layout {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 32px;
    }

    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 60px);
      font-weight: 700;
      color: var(--text);
      line-height: 0.95;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .hero-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .hero-pos {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--mil-gold);
      letter-spacing: 1px;
    }

    .hero-sep { color: var(--border2); }

    .hero-affiliate {
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--text2);
      letter-spacing: 0.5px;
    }

    .hero-chips {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    /* OFP ring */
    .ofp-block { text-align: center; flex-shrink: 0; }

    .ofp-ring {
      width: 96px;
      height: 96px;
      position: relative;
      margin: 0 auto 8px;
    }

    .ofp-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ofp-track { fill: none; stroke: var(--surface3); stroke-width: 7; }
    .ofp-arc   { fill: none; stroke-width: 7; stroke-linecap: round; }

    .ofp-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .ofp-num {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
    }

    .ofp-lbl {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--text3);
      text-transform: uppercase;
      margin-top: 1px;
    }

    .ofp-risk-label {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text3);
    }

    /* ── Summary block ─────────────────────────────────────────────────────── */
    .summary-block {
      background: var(--summary-bg);
      border-left: 4px solid var(--summary-border);
      border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
      padding: 20px 24px;
      margin-bottom: 28px;
      animation: fadeUp 0.35s ease 0.05s both;
    }

    .summary-block p {
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.75;
      color: var(--summary-text);
      font-style: italic;
    }

    /* ── Strengths / Concerns side-by-side ─────────────────────────────────── */
    .scout-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
      animation: fadeUp 0.35s ease 0.1s both;
    }

    .scout-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
    }

    .scout-panel-head {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .scout-panel-head.strengths { color: var(--green2); }
    .scout-panel-head.concerns  { color: var(--red2); }

    .scout-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .scout-list li {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text2);
      padding-left: 18px;
      position: relative;
      line-height: 1.5;
    }

    .scout-list li::before {
      content: '\25B8';
      position: absolute;
      left: 0;
      font-size: 10px;
      top: 3px;
    }

    .scout-list.strengths li::before { color: var(--green2); }
    .scout-list.concerns  li::before { color: var(--red2); }

    /* ── Two-column layout ─────────────────────────────────────────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      align-items: start;
    }

    /* ── Stat tiles ────────────────────────────────────────────────────────── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(82px, 1fr));
      gap: 8px;
      margin-bottom: 28px;
    }

    .stat-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-tile::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--surface3);
    }
    .stat-tile.above::after  { background: var(--green); }
    .stat-tile.avg-::after   { background: var(--yellow); }
    .stat-tile.below::after  { background: var(--orange); }
    .stat-tile.neutral::after { background: var(--border2); }

    .tile-val {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .tile-name {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-top: 5px;
    }

    .tile-ctx {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text3);
      margin-top: 3px;
    }

    /* ── Tool grade bars ───────────────────────────────────────────────────── */
    .tool-section { margin-bottom: 28px; }

    .tool-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .tool-name {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text2);
      width: 48px;
      flex-shrink: 0;
    }

    .tool-track {
      flex: 1;
      height: 26px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .tool-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s cubic-bezier(0.25, 0.8, 0.25, 1);
      width: 0%;
      position: absolute;
      inset: 0 auto 0 0;
    }

    .fill-70up { background: linear-gradient(90deg, #065f46, #10b981); }
    .fill-60   { background: linear-gradient(90deg, #065f46, #06b6d4); }
    .fill-55   { background: linear-gradient(90deg, #78350f, #fbbf24); }
    .fill-50   { background: linear-gradient(90deg, #7c2d12, #f97316); }
    .fill-45   { background: linear-gradient(90deg, #7f1d1d, #ef4444); }
    .fill-sub  { background: linear-gradient(90deg, #450a0a, #dc2626); }

    .fill-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      max-width: 100%;
    }

    .tool-track-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 9px;
      pointer-events: none;
      z-index: 1;
    }

    .tool-track-label.is-outside .fill-label {
      color: var(--text2);
    }

    .tool-grade {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      width: 34px;
      text-align: right;
      flex-shrink: 0;
    }

    .tool-desc-txt {
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--text3);
      font-style: italic;
      width: 160px;
      flex-shrink: 0;
    }

    .grade-scale { display: flex; gap: 3px; margin-bottom: 12px; }
    .scale-pip { flex: 1; height: 5px; border-radius: 2px; }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text3);
      margin-top: 4px;
      margin-bottom: 18px;
    }

    /* ── Perf bars ─────────────────────────────────────────────────────────── */
    .perf-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .perf-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.3px;
      color: var(--text2);
      width: 88px;
      flex-shrink: 0;
    }

    .perf-track {
      flex: 1;
      height: 14px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .perf-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

    .perf-value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      width: 56px;
      text-align: right;
      flex-shrink: 0;
    }

    .perf-vs {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text3);
      width: 48px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Side column cards ─────────────────────────────────────────────────── */
    .side-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
    }

    .side-card-head {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* ── TAB SYSTEM ────────────────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }

    .tab-btn {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 10px 18px;
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color var(--transition), border-color var(--transition);
      position: relative;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--mil-gold);
      border-bottom-color: var(--mil-gold);
    }

    .tab-btn .tab-count {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--text3);
      padding: 1px 5px;
      border-radius: 10px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .tab-btn.active .tab-count {
      background: rgba(240,179,35,0.15);
      color: var(--mil-gold);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Rankings tab ──────────────────────────────────────────────────────── */
    .rank-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .rank-row:last-child { border-bottom: none; }

    a.rank-row:hover .rank-source { color: var(--gold); }
    a.rank-row { display: flex; text-decoration: none; }

    .rank-source {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      transition: color var(--transition);
    }

    .rank-list {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text3);
      margin-top: 3px;
    }

    .rank-num {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      text-align: right;
    }

    .rank-num-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text3);
      text-align: right;
      margin-top: 2px;
    }

    /* ── News tab ──────────────────────────────────────────────────────────── */
    .news-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .news-item:last-child { border-bottom: none; }

    .news-item a {
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .news-item a:hover .news-headline { color: var(--gold); }

    .news-headline {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 5px;
      transition: color var(--transition);
    }

    .news-summary {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text2);
      line-height: 1.55;
      margin-bottom: 6px;
      font-style: italic;
    }

    .news-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text3);
    }

    .news-no-link .news-headline { color: var(--text2); cursor: default; }

    /* ── Video tab ─────────────────────────────────────────────────────────── */
    .video-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .video-item:last-child { border-bottom: none; }

    .video-item a {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      width: 100%;
    }
    .video-item a:hover .video-title { color: var(--gold); }

    .video-thumb {
      width: 36px;
      height: 36px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .video-thumb svg {
      width: 12px;
      height: 12px;
      fill: var(--red2);
      margin-left: 2px;
    }

    .video-title {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
      transition: color var(--transition);
      margin-bottom: 4px;
    }

    .video-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text3);
    }

    .video-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(239,68,68,0.1);
      color: var(--red2);
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── BF / Media section (within rankings tab) ──────────────────────────── */
    .media-subsection-head {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--mil-gold);
      padding: 12px 0 8px;
      margin-top: 6px;
      border-top: 1px solid var(--border);
    }
    .media-subsection-head:first-child { border-top: none; margin-top: 0; padding-top: 0; }

    .media-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .media-item:last-child { border-bottom: none; }

    .media-item a {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      width: 100%;
    }
    .media-item a:hover .media-title { color: var(--gold); text-decoration: underline; }

    .media-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 2px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .media-badge.youtube  { background: rgba(239,68,68,0.15); color: var(--red2); }
    .media-badge.podcast  { background: rgba(6,182,212,0.15); color: var(--cyan); }
    .media-badge.article  { background: rgba(240,179,35,0.15); color: var(--gold); }
    .media-badge.forum    { background: rgba(16,185,129,0.15); color: var(--green2); }
    .media-badge.reddit   { background: rgba(249,115,22,0.15); color: var(--orange); }
    .media-badge.bf       { background: rgba(240,179,35,0.18); color: var(--mil-gold); border: 1px solid rgba(240,179,35,0.3); }

    .media-title {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text2);
      line-height: 1.35;
      transition: color var(--transition);
    }

    .media-source {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* ── Profile / meta grid ───────────────────────────────────────────────── */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .meta-tile {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 12px 14px;
      text-align: center;
    }

    .meta-tile .mt-val {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .meta-tile .mt-lbl {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--text3);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Empty state ───────────────────────────────────────────────────────── */
    .empty-state {
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--text3);
      letter-spacing: 0.5px;
      padding: 12px 0;
      text-align: center;
    }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 960px) {
      .two-col { grid-template-columns: 1fr; }
      .tool-desc-txt { display: none; }
    }

    @media (max-width: 640px) {
      .scout-grid { grid-template-columns: 1fr; }
      .hero-layout { flex-direction: column; }
      .stat-row { grid-template-columns: repeat(3, 1fr); }
      .tab-btn { font-size: 12px; padding: 8px 12px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">
      <div class="badge">MIL</div>
      Prospect Hub
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Roster</a>
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">☀️</button>
    </div>
  </nav>

  <div class="page-wrap">
    <div id="player-root">
      <div style="padding:80px 0; text-align:center; color:var(--text3); font-family:var(--font-display); font-size:14px; letter-spacing:2px;">Loading...</div>
    </div>
  </div>

  <script type="module">
    import { PLAYERS_BY_ID, GRADE_COLOR, GRADE_LABEL, LEVEL_LABELS } from './data/players.js';

    /* ── Theme toggle ─────────────────────────────────────────────────────── */
    const THEME_KEY = 'ph-theme';
    const savedTheme = document.documentElement.getAttribute('data-theme') || 'dark';
    const toggleBtn = document.getElementById('theme-toggle');
    toggleBtn.textContent = savedTheme === 'light' ? '🌙' : '☀️';

    toggleBtn.addEventListener('click', function() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem(THEME_KEY, next);
      toggleBtn.textContent = next === 'light' ? '🌙' : '☀️';
    });

    /* ── Load player ──────────────────────────────────────────────────────── */
    const params   = new URLSearchParams(window.location.search);
    const playerId = params.get('id');
    const base     = playerId ? PLAYERS_BY_ID[playerId] : null;

    if (!base) {
      document.getElementById('player-root').innerHTML =
        '<div style="padding:80px 0; text-align:center;">'
        + '<div style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--text3);margin-bottom:16px;">Player not found</div>'
        + '<a href="index.html" style="color:var(--gold);font-family:var(--font-display);">\u2190 Back to roster</a>'
        + '</div>';
      document.title = 'Not Found \u00B7 Brewers Prospect Hub';
    } else {
      document.title = base.name + ' \u00B7 Brewers Prospect Hub';

      async function loadAndRender() {
        let scout = {};
        try {
          const res = await fetch('./data/scouting/' + playerId + '.json');
          if (res.ok) {
            scout = await res.json();
            if (scout.error) scout = {};
          }
        } catch (e) {}

        const p = {
          ...base, ...scout,
          statsBySeason: base.statsBySeason || {},
          latestStatsSeason: base.latestStatsSeason || null,
          stats2025:   base.stats2025,
          stats2026:   base.stats2026,
          id:          base.id,
          affiliate:   base.affiliate,
          height:      base.height,
          weight:      base.weight,
          bats:        base.bats,
          throws:      base.throws,
          draftInfo:   base.draftInfo,
          isPitcher:   base.isPitcher,
          grades:      scout.grades || base.grades || null,
          pitchGrades: scout.pitchGrades || base.pitchGrades || null,
        };
        render(p);
      }
      loadAndRender();
    }

    /* ── Helpers ──────────────────────────────────────────────────────────── */
    function gradeClass(g) {
      if (!g) return 'fill-sub';
      if (g >= 70) return 'fill-70up';
      if (g >= 60) return 'fill-60';
      if (g >= 55) return 'fill-55';
      if (g >= 50) return 'fill-50';
      if (g >= 45) return 'fill-45';
      return 'fill-sub';
    }

    function gradeColor(g) {
      if (!g) return 'var(--text3)';
      return GRADE_COLOR(g);
    }

    function gradePct(g) {
      if (!g) return 0;
      return Math.min(100, ((g - 20) / 60) * 100);
    }

    function riskColor(r) {
      return { 'Extreme':'var(--red)', 'Very High':'var(--orange)', 'High':'var(--yellow)', 'Medium':'var(--cyan)', 'Low':'var(--green)' }[r] || 'var(--text3)';
    }

    function fmt3(v) { return v != null ? v.toFixed(3).replace(/^0/, '') : '\u2014'; }
    function fmtPct(v) { return v != null ? v.toFixed(1) + '%' : '\u2014'; }
    function fmtN(v, d) { return v != null ? v.toFixed(d || 2) : '\u2014'; }
    function hasNum(v) { return typeof v === 'number' && Number.isFinite(v); }
    function joinCtx(parts) { return parts.filter(Boolean).join(' · '); }
    function latestSeasonStats(p) {
      const seasons = Object.keys(p.statsBySeason || {})
        .map((season) => Number(season))
        .filter(Number.isFinite)
        .sort((a, b) => b - a);

      if (seasons.length) {
        const season = seasons[0];
        return { season, stats: p.statsBySeason[String(season)] };
      }

      if (p.latestStatsSeason && p.statsBySeason?.[String(p.latestStatsSeason)]) {
        return { season: Number(p.latestStatsSeason), stats: p.statsBySeason[String(p.latestStatsSeason)] };
      }

      if (p.stats2026) return { season: 2026, stats: p.stats2026 };
      if (p.stats2025) return { season: 2025, stats: p.stats2025 };
      return { season: null, stats: null };
    }

    function tier(val, lgVal, lower) {
      if (val == null || lgVal == null) return 'neutral';
      const better = lower ? val < lgVal : val > lgVal;
      return Math.abs(val - lgVal) / lgVal < 0.05 ? 'avg-' : better ? 'above' : 'below';
    }

    /* ── Safe URL helper — drops URLs that are known bad patterns ─────────── */
    function safeUrl(url, source) {
      if (!url) return null;
      // Drop MiLB player URLs (they redirect to wrong pages)
      if (url.includes('milb.com') && url.includes('/prospects/')) return null;
      // Drop generic fallback URLs with no specific player path
      const genericPatterns = [
        /mlb\.com\/prospects$/,
        /fangraphs\.com\/prospects\/the-board$/,
        /baseballamerica\.com\/prospect-rankings\/?$/,
        /prospectslive\.com\/lists$/,
        /baseballprospectus\.com\/prospects\/?$/,
      ];
      for (const pat of genericPatterns) {
        if (pat.test(url)) return null;
      }
      return url;
    }

    /* ── Radar ────────────────────────────────────────────────────────────── */

    /* ── Rankings tab content ─────────────────────────────────────────────── */
    function buildRankingsTab(p) {
      let html = '';

      function dateSortValue(date) {
        if (!date || typeof date !== 'string') return 0;
        const trimmed = date.trim();
        if (!trimmed) return 0;
        if (/^\d{4}$/.test(trimmed)) return Date.parse(trimmed + '-01-01T00:00:00Z') || 0;
        if (/^\d{4}-\d{2}$/.test(trimmed)) return Date.parse(trimmed + '-01T00:00:00Z') || 0;
        if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return Date.parse(trimmed + 'T00:00:00Z') || 0;
        return Date.parse(trimmed) || 0;
      }

      function sortByDateDesc(a, b) {
        const diff = dateSortValue(b?.date) - dateSortValue(a?.date);
        if (diff !== 0) return diff;
        return String(a?.title || a?.source || a?.listName || '').localeCompare(String(b?.title || b?.source || b?.listName || ''));
      }

      // Ranking rows
      const rankings = (p.rankings || []).slice().sort(function(a, b) {
        return sortByDateDesc(a, b);
      });
      if (rankings.length) {
        html += '<div style="margin-bottom:20px;">';
        rankings.forEach(function(r) {
          const url = safeUrl(r.url, r.source);
          let numHtml = '';
          if (r.grade)      numHtml += '<div class="rank-num">' + r.grade + '</div><div class="rank-num-sub">FV Grade</div>';
          if (r.systemRank) numHtml += '<div class="rank-num">#' + r.systemRank + '</div><div class="rank-num-sub">In System</div>';
          if (r.rank)       numHtml += '<div class="rank-num">#' + r.rank + '</div><div class="rank-num-sub">Overall</div>';

          const inner = '<div style="flex:1">'
            + '<div class="rank-source">' + (r.source||'') + '</div>'
            + '<div class="rank-list">' + (r.listName||'') + (r.date ? ' \u00B7 ' + r.date : '') + '</div>'
            + '</div>'
            + (numHtml ? '<div style="text-align:right;flex-shrink:0;">' + numHtml + '</div>' : '');

          if (url) {
            html += '<a href="' + url + '" target="_blank" rel="noopener" class="rank-row">' + inner + '</a>';
          } else {
            html += '<div class="rank-row">' + inner + '</div>';
          }
        });
        html += '</div>';
      } else {
        html += '<div class="empty-state">No rankings data yet</div>';
      }

      // Media references (articles, podcasts etc.)
      const mediaRefs = (p.mediaReferences || []).slice().sort(function(a, b) {
        return sortByDateDesc(a, b);
      });
      const bfLinks   = (p.brewerFanaticLinks || []).slice().sort(function(a, b) {
        return sortByDateDesc(a, b);
      });
      const bfUrls    = new Set(bfLinks.map(b=>b.url).filter(Boolean));
      const bfTitles  = new Set(bfLinks.map(b=>(b.title||'').toLowerCase()));
      const cleanMedia = mediaRefs.filter(m => m.url && !bfUrls.has(m.url) && !bfTitles.has((m.title||'').toLowerCase()));

      if (cleanMedia.length || bfLinks.length) {
        if (cleanMedia.length) {
          html += '<div class="media-subsection-head">Articles &amp; Podcasts</div>';
          cleanMedia.forEach(function(m) {
            const badge = {youtube:'YT',podcast:'POD',reddit:'RED',forum:'FRM'}[m.type] || 'ART';
            const inner = '<span class="media-badge ' + (m.type||'article') + '">' + badge + '</span>'
              + '<div><div class="media-title">' + (m.title||'Untitled') + '</div>'
              + '<div class="media-source">' + (m.source||'') + (m.date ? ' \u00B7 ' + m.date : '') + '</div></div>';
            html += '<div class="media-item">'
              + (m.url ? '<a href="'+m.url+'" target="_blank" rel="noopener">'+inner+'</a>' : inner)
              + '</div>';
          });
        }

        if (bfLinks.length) {
          html += '<div class="media-subsection-head">Brewer Fanatic (' + bfLinks.length + ')</div>';
          bfLinks.forEach(function(bf) {
            const badge = {video:'VID',forum:'FRM',ranking:'RNK',draft:'DFT'}[bf.type] || 'ART';
            const inner = '<span class="media-badge bf">' + badge + '</span>'
              + '<div><div class="media-title">' + (bf.title||'Untitled') + '</div>'
              + '<div class="media-source">Brewer Fanatic' + (bf.date ? ' \u00B7 ' + bf.date : '') + '</div></div>';
            html += '<div class="media-item">'
              + (bf.url ? '<a href="'+bf.url+'" target="_blank" rel="noopener">'+inner+'</a>' : '<div style="display:flex;align-items:flex-start;gap:10px;">'+inner+'</div>')
              + '</div>';
          });
        }
      }

      return html || '<div class="empty-state">No coverage data yet</div>';
    }

    /* ── News tab content ─────────────────────────────────────────────────── */
    function buildNewsTab(p) {
      const news = (p.recentNews || []).slice().sort(function(a, b) {
        const parse = (date) => {
          if (!date || typeof date !== 'string') return 0;
          const trimmed = date.trim();
          if (/^\d{4}$/.test(trimmed)) return Date.parse(trimmed + '-01-01T00:00:00Z') || 0;
          if (/^\d{4}-\d{2}$/.test(trimmed)) return Date.parse(trimmed + '-01T00:00:00Z') || 0;
          if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return Date.parse(trimmed + 'T00:00:00Z') || 0;
          return Date.parse(trimmed) || 0;
        };
        return parse(b?.date) - parse(a?.date);
      });
      if (!news.length) return '<div class="empty-state">No recent news found</div>';

      return news.map(function(item) {
        const meta = (item.source||'') + (item.date ? ' \u00B7 ' + item.date : '');
        const inner = '<div class="news-headline">' + (item.title||'Untitled') + '</div>'
          + (item.summary ? '<div class="news-summary">' + item.summary + '</div>' : '')
          + '<div class="news-meta">' + meta + '</div>';

        if (item.url) {
          return '<div class="news-item"><a href="' + item.url + '" target="_blank" rel="noopener">' + inner + '</a></div>';
        }
        return '<div class="news-item news-no-link">' + inner + '</div>';
      }).join('');
    }

    /* ── Video tab content ────────────────────────────────────────────────── */
    function extractKnownPlayerMediaId(p) {
      const sources = []
        .concat(p.rankings || [])
        .concat(p.mediaReferences || [])
        .concat(p.recentNews || [])
        .concat(p.videoLinks || []);

      for (const item of sources) {
        const url = String(item?.url || '');
        const match = url.match(/(?:\/player\/|\/prospects\/)[^\/?#]*-(\d{5,})/i);
        if (match) return match[1];
      }

      return null;
    }

    function normalizeVideoHref(url, p) {
      if (!url || !url.startsWith('http')) return url;

      try {
        const parsed = new URL(url);
        const playerMediaId = extractKnownPlayerMediaId(p);

        if (parsed.hostname === 'www.milb.com') {
          const milbTeamVideo = parsed.pathname.match(/^\/[^\/]+\/video\/(.+)$/i);
          if (milbTeamVideo) {
            parsed.pathname = '/video/' + milbTeamVideo[1];
          }

          if (parsed.pathname.startsWith('/video/') && playerMediaId && !parsed.searchParams.has('t')) {
            parsed.searchParams.set('t', 'playerid-' + playerMediaId);
          }
        }

        if (parsed.hostname === 'www.mlb.com') {
          const mlbTeamVideo = parsed.pathname.match(/^\/[^\/]+\/video\/(.+)$/i);
          if (mlbTeamVideo) {
            parsed.pathname = '/video/' + mlbTeamVideo[1];
          }
        }

        return parsed.toString();
      } catch {
        return url;
      }
    }

    function buildVideoTab(p) {
      const videos = (p.videoLinks || []).slice().sort(function(a, b) {
        const parse = (date) => {
          if (!date || typeof date !== 'string') return 0;
          const trimmed = date.trim();
          if (/^\d{4}$/.test(trimmed)) return Date.parse(trimmed + '-01-01T00:00:00Z') || 0;
          if (/^\d{4}-\d{2}$/.test(trimmed)) return Date.parse(trimmed + '-01T00:00:00Z') || 0;
          if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return Date.parse(trimmed + 'T00:00:00Z') || 0;
          return Date.parse(trimmed) || 0;
        };
        return parse(b?.date) - parse(a?.date);
      });
      if (!videos.length) return '<div class="empty-state">No videos found</div>';

      const playIcon = '<svg viewBox="0 0 12 12"><polygon points="2,1 11,6 2,11"/></svg>';

      return videos.map(function(v) {
        const typeLabel = (v.type||'video').replace(/-/g,' ');

        // Build the best available URL:
        // 1. Use the stored URL if it looks valid
        // 2. If channel is known, construct a YouTube channel search URL
        // 3. Fall back to a plain YouTube search for the player + title
        let href = null;
        if (v.url && v.url.startsWith('http')) {
          href = normalizeVideoHref(v.url, p);
        } else if (v.channel) {
          const q = encodeURIComponent(v.channel + ' ' + (v.title || p.name));
          href = 'https://www.youtube.com/results?search_query=' + q;
        } else {
          const q = encodeURIComponent((v.title || '') + ' ' + p.name + ' baseball');
          href = 'https://www.youtube.com/results?search_query=' + q;
        }

        // Show a small indicator if the URL is a search rather than a direct link
        const isSearch = !v.url || !v.url.startsWith('http');
        const searchNote = isSearch ? ' <span style="font-size:9px;opacity:0.6;">(search)</span>' : '';

        const info = '<div class="video-info">'
          + '<div class="video-title">' + (v.title||'Untitled') + '<span class="video-badge">' + typeLabel + '</span>' + searchNote + '</div>'
          + '<div class="video-meta">' + (v.channel||'') + (v.date ? ' \u00B7 ' + v.date : '') + '</div>'
          + '</div>';
        const thumb = '<div class="video-thumb">' + playIcon + '</div>';

        return '<div class="video-item"><a href="' + href + '" target="_blank" rel="noopener">' + thumb + info + '</a></div>';
      }).join('');
    }

    /* ── Main render ──────────────────────────────────────────────────────── */
    function render(p) {
      const latestStats = latestSeasonStats(p);
      const s    = latestStats.stats;
      const statsSeason = latestStats.season;
      const g    = p.grades;
      const risk = g?.risk || '';
      const pitch = p.pitchGrades || {};
      const pitcherBreaking = pitch.curveball ?? pitch.slider ?? pitch.cutter ?? pitch.breakingBall ?? null;
      const pitcherBreakingKey = pitch.curveball != null ? 'CB'
        : pitch.slider != null ? 'SL'
        : pitch.cutter != null ? 'CT'
        : 'BRK';

      /* Tool grade definitions */
      const tools = p.isPitcher ? [
        { key:'FB',  val:pitch.fastball, desc:'Velocity, life, induced action' },
        { key:pitcherBreakingKey, val:pitcherBreaking, desc:'Best breaking ball quality' },
        { key:'CH',  val:pitch.changeup, desc:'Separation, fade, deception' },
        { key:'CMD', val:pitch.command ?? pitch.control, desc:'Strike quality and command' },
      ] : [
        { key:'HIT', val:g?.hit,   desc:'Contact, bat-to-ball, swing decisions' },
        { key:'PWR', val:g?.power, desc:'Raw power, exit velo, game power' },
        { key:'RUN', val:g?.run,   desc:'Speed, baserunning IQ, SB efficiency' },
        { key:'FLD', val:g?.field, desc:'Range, hands, positioning, instincts' },
        { key:'ARM', val:g?.arm,   desc:'Strength and accuracy' },
      ];

      /* OFP */
      const ofp      = g?.ofp ?? 50;
      const ofpPct   = (ofp - 20) / 60;
      const ofpClr   = gradeColor(ofp);
      const arcCirc  = 2 * Math.PI * 32;

      /* Stat tiles */
      const hTiles = s ? [
        { val:fmt3(s.avg),    name:'AVG',    ctx:hasNum(s.leagueAvgAvg) ? 'Lg ' + fmt3(s.leagueAvgAvg) : '', t:tier(s.avg,s.leagueAvgAvg) },
        { val:fmt3(s.obp),    name:'OBP',    ctx:hasNum(s.leagueAvgObp) ? 'Lg ' + fmt3(s.leagueAvgObp) : '', t:tier(s.obp,s.leagueAvgObp) },
        { val:fmt3(s.slg),    name:'SLG',    ctx:hasNum(s.leagueAvgSlg) ? 'Lg ' + fmt3(s.leagueAvgSlg) : '', t:tier(s.slg,s.leagueAvgSlg) },
        { val:fmtPct(s.bbPct),name:'BB%',    ctx:hasNum(s.leagueAvgBbPct) ? 'Lg ' + fmtPct(s.leagueAvgBbPct) : '', t:tier(s.bbPct,s.leagueAvgBbPct) },
        { val:fmtPct(s.kPct), name:'K%',     ctx:hasNum(s.leagueAvgKPct) ? 'Lg ' + fmtPct(s.leagueAvgKPct) : '', t:tier(s.kPct,s.leagueAvgKPct,true) },
        { val:s.hr??'\u2014', name:'HR',     ctx:(s.g??'\u2014')+' G',                   t:'neutral' },
        { val:s.sb!=null?s.sb+'/'+s.sbAtt:'\u2014', name:'SB/ATT', ctx:(hasNum(s.sb) && hasNum(s.sbAtt) && s.sbAtt > 0) ? Math.round(s.sb/s.sbAtt*100)+'%' : '', t:'neutral' },
        { val:fmt3(s.iso),    name:'ISO',    ctx:hasNum(s.babip) ? 'BABIP ' + fmt3(s.babip) : '', t:tier(s.iso,0.140) },
      ] : [];

      const pTiles = (s && p.isPitcher) ? [
        { val:fmtN(s.era),    name:'ERA',    ctx:hasNum(s.leagueAvgEra) ? 'Lg ' + fmtN(s.leagueAvgEra) : '', t:tier(s.era,s.leagueAvgEra,true) },
        { val:fmtPct(s.kPct), name:'K%',     ctx:hasNum(s.leagueAvgKPct) ? 'Lg ' + fmtPct(s.leagueAvgKPct) : '', t:tier(s.kPct,s.leagueAvgKPct) },
        { val:fmtPct(s.bbPct),name:'BB%',    ctx:'',                                      t:tier(s.bbPct,10,true) },
        { val:fmtN(s.fip),    name:'FIP',    ctx:hasNum(s.xfip) ? 'xFIP ' + fmtN(s.xfip) : '', t:tier(s.fip,s.leagueAvgEra,true) },
        { val:fmtN(s.ip,1),   name:'IP',     ctx:(s.gs||'\u2014')+' GS',                 t:'neutral' },
        { val:fmtPct(s.swStrPct),name:'SwStr%',ctx:'',                                   t:tier(s.swStrPct,11) },
        { val:fmtPct(s.gbPct),name:'GB%',    ctx:'',                                      t:tier(s.gbPct,44) },
        { val:fmtN(s.whip),   name:'WHIP',   ctx:'',                                      t:tier(s.whip,1.30,true) },
      ] : [];

      const tiles = p.isPitcher ? pTiles : hTiles;

      /* Perf bars */
      const hPerfs = s ? [
        { label:'Walk %',      val:s.bbPct,      lg:s.leagueAvgBbPct, fmt:fmtPct,  low:false },
        { label:'Strikeout %', val:s.kPct,       lg:s.leagueAvgKPct,  fmt:fmtPct,  low:true  },
        { label:'Hard Hit %',  val:s.hardHitPct, lg:32,               fmt:fmtPct,  low:false },
        { label:'90th EV',     val:s.ev90,       lg:103,              fmt:v=>fmtN(v,1)+' mph', low:false },
        { label:'ISO',         val:s.iso,        lg:0.140,            fmt:fmt3,    low:false },
        { label:'GB%',         val:s.gbPct,      lg:40,               fmt:fmtPct,  low:false },
      ] : [];

      const pPerfs = (s&&p.isPitcher) ? [
        { label:'K%',     val:s.kPct,     lg:26,            fmt:fmtPct, low:false },
        { label:'BB%',    val:s.bbPct,    lg:10,            fmt:fmtPct, low:true  },
        { label:'SwStr%', val:s.swStrPct, lg:11,            fmt:fmtPct, low:false },
        { label:'GB%',    val:s.gbPct,    lg:44,            fmt:fmtPct, low:false },
        { label:'ERA',    val:s.era,      lg:s.leagueAvgEra,fmt:fmtN,   low:true  },
        { label:'FIP',    val:s.fip,      lg:s.leagueAvgEra,fmt:fmtN,   low:true  },
      ] : [];

      const perfs = p.isPitcher ? pPerfs : hPerfs;

      /* Tab counts */
      const rankCount  = (p.rankings||[]).length + (p.mediaReferences||[]).length + (p.brewerFanaticLinks||[]).length;
      const newsCount  = (p.recentNews||[]).length;
      const videoCount = (p.videoLinks||[]).length;

      /* Hero chips */
      const chipsHTML = [
        '<span class="chip">Age ' + p.age + '</span>',
        '<span class="chip">' + (p.bats||'?') + '/' + (p.throws||'?') + ' \u00B7 ' + (p.height||'') + ' \u00B7 ' + (p.weight||'') + ' lbs</span>',
        p.draftInfo ? '<span class="chip gold">' + p.draftInfo + '</span>' : '',
        risk ? '<span class="chip" style="color:'+riskColor(risk)+';border-color:'+riskColor(risk)+'40;background:'+riskColor(risk)+'12">' + risk + ' Risk</span>' : '',
        p.eta ? '<span class="chip cyan">ETA ' + p.eta + '</span>' : '',
      ].filter(Boolean).join('');

      function gradeLabelText(val, compact) {
        const full = GRADE_LABEL(val);
        if (!compact) return full;
        return {
          'Plus-Plus': 'P-P',
          'Plus': 'Plus',
          'Above Avg': 'A. Avg',
          'Average': 'Avg',
          'Below Avg': 'B. Avg',
          'Well Below': 'W. Below',
        }[full] || full;
      }

      /* Build tool bars */
      const toolsHTML = tools.map(t => {
        const pct = gradePct(t.val);
        const compact = pct > 0 && pct < 42;
        const outside = pct > 0 && pct < 30;
        return (
        '<div class="tool-bar-row">'
        + '<span class="tool-name">' + t.key + '</span>'
        + '<div class="tool-track">'
        + '<div class="tool-fill ' + gradeClass(t.val) + '" data-pct="' + pct + '" style="width:0"></div>'
        + '<div class="tool-track-label' + (outside ? ' is-outside' : '') + '"><span class="fill-label">' + (t.val??'\u2014') + ' \u00B7 ' + gradeLabelText(t.val, compact) + '</span></div>'
        + '</div>'
        + '<span class="tool-grade" style="color:' + gradeColor(t.val) + '">' + (t.val??'\u2014') + '</span>'
        + '<span class="tool-desc-txt">' + t.desc + '</span>'
        + '</div>'
        );
      }).join('');

      /* Build stat tiles */
      const tilesHTML = tiles.map(t =>
        '<div class="stat-tile ' + t.t + '">'
        + '<div class="tile-val">' + t.val + '</div>'
        + '<div class="tile-name">' + t.name + '</div>'
        + (t.ctx ? '<div class="tile-ctx">' + t.ctx + '</div>' : '')
        + '</div>'
      ).join('');

      /* Build perf bars */
      const perfsHTML = perfs.map(perf => {
        if (perf.val == null || perf.lg == null || perf.lg === 0) {
          return '<div class="perf-row">'
            + '<span class="perf-label">' + perf.label + '</span>'
            + '<div class="perf-track"><div class="perf-fill" style="width:0%;background:var(--surface3)"></div></div>'
            + '<span class="perf-value" style="color:var(--text3)">' + perf.fmt(perf.val) + '</span>'
            + '<span class="perf-vs">avg ' + perf.fmt(perf.lg) + '</span>'
            + '</div>';
        }
        const good = perf.low ? perf.val < perf.lg : perf.val > perf.lg;
        const pct  = perf.low
          ? Math.min(100, Math.max(5, (2 - perf.val/perf.lg)*50))
          : Math.min(100, Math.max(5, (perf.val/(perf.lg*1.5))*80));
        const clr  = perf.val==null ? 'var(--text3)' : good ? 'var(--green)' : Math.abs((perf.val-perf.lg)/perf.lg)<0.05 ? 'var(--yellow)' : 'var(--orange)';
        const grad = good ? 'linear-gradient(90deg,#065f46,#10b981)' : 'linear-gradient(90deg,#7c2d12,#f97316)';
        return '<div class="perf-row">'
          + '<span class="perf-label">' + perf.label + '</span>'
          + '<div class="perf-track"><div class="perf-fill" style="width:'+pct+'%;background:'+grad+'"></div></div>'
          + '<span class="perf-value" style="color:'+clr+'">' + perf.fmt(perf.val) + '</span>'
          + '<span class="perf-vs">avg ' + perf.fmt(perf.lg) + '</span>'
          + '</div>';
      }).join('');

      /* Strengths / concerns */
      const strHTML = (p.strengths||[]).map(s=>'<li>'+s+'</li>').join('');
      const conHTML = (p.concerns||[]).map(c=>'<li>'+c+'</li>').join('');

      /* ── Assemble page ────────────────────────────────────────────────── */
      document.getElementById('player-root').innerHTML =

        /* HERO */
        '<div class="player-hero">'
        + '<a href="index.html" class="back-link">\u2190 All Prospects</a>'
        + '<div class="hero-layout">'
        + '<div>'
        + '<div class="hero-name">' + p.name + '</div>'
        + '<div class="hero-meta-row">'
        + '<span class="hero-pos">' + p.position + '</span>'
        + '<span class="hero-sep">\u00B7</span>'
        + '<span class="hero-affiliate">' + (LEVEL_LABELS[p.level]||p.level) + ' \u00B7 ' + (p.affiliate||'') + '</span>'
        + '</div>'
        + '<div class="hero-chips">' + chipsHTML + '</div>'
        + '</div>'
        + '<div class="ofp-block">'
        + '<div class="ofp-ring"><svg class="ofp-svg" viewBox="0 0 80 80">'
        + '<circle class="ofp-track" cx="40" cy="40" r="32"/>'
        + '<circle class="ofp-arc" cx="40" cy="40" r="32" stroke="'+ofpClr+'" stroke-dasharray="'+(ofpPct*arcCirc).toFixed(1)+' '+arcCirc.toFixed(1)+'" stroke-dashoffset="0"/>'
        + '</svg>'
        + '<div class="ofp-center"><div class="ofp-num" style="color:'+ofpClr+'">'+ofp+'</div><div class="ofp-lbl">OFP</div></div>'
        + '</div>'
        + '<div class="ofp-risk-label" style="color:'+riskColor(risk)+'">' + risk + ' Risk</div>'
        + '</div>'
        + '</div></div>'

        /* SUMMARY */
        + (p.summary ? '<div class="summary-block"><p>' + p.summary + '</p></div>' : '')

        /* STRENGTHS + CONCERNS side by side */
        + '<div class="scout-grid">'
        + '<div class="scout-panel">'
        + '<div class="scout-panel-head strengths">Strengths</div>'
        + (strHTML ? '<ul class="scout-list strengths">' + strHTML + '</ul>' : '<div class="empty-state">—</div>')
        + '</div>'
        + '<div class="scout-panel">'
        + '<div class="scout-panel-head concerns">Areas to Watch</div>'
        + (conHTML ? '<ul class="scout-list concerns">' + conHTML + '</ul>' : '<div class="empty-state">—</div>')
        + '</div>'
        + '</div>'

        /* TWO COLUMN */
        + '<div class="two-col">'

        /* MAIN COL */
        + '<div class="main-col">'

        /* Stats */
        + '<div class="section-head"><span class="label">' + (statsSeason ? statsSeason + ' Season' : 'Season Stats') + ' \u00B7 ' + (LEVEL_LABELS[p.level]||p.level) + '</span></div>'
        + '<div class="stat-row stagger">' + tilesHTML + '</div>'

        /* Tool grades */
        + '<div class="tool-section">'
        + '<div class="section-head"><span class="label">20\u201380 Scouting Grades</span></div>'
        + '<div class="grade-scale">'
        + ['#450a0a','#7c2d12','#78350f','#f97316','#fbbf24','#06b6d4','#10b981'].map(c=>'<div class="scale-pip" style="background:'+c+';flex:1"></div>').join('')
        + '</div>'
        + '<div class="scale-labels"><span>20</span><span>30</span><span>40</span><span>50</span><span>60</span><span>70</span><span>80</span></div>'
        + toolsHTML
        + '</div>'

        /* Perf bars */
        + '<div class="section-head" style="margin-top:24px"><span class="label">Performance vs. League Average</span></div>'
        + (perfsHTML || '<div class="empty-state" style="text-align:left;padding:0">No stats data</div>')

        + '</div>' /* /main-col */

        /* SIDE COL */
        + '<div class="side-col">'

        /* Profile */
        + '<div class="side-card">'
        + '<div class="side-card-head">Profile</div>'
        + '<div class="meta-grid">'
        + '<div class="meta-tile"><div class="mt-val">'+(p.eta||'\u2014')+'</div><div class="mt-lbl">MLB ETA</div></div>'
        + '<div class="meta-tile"><div class="mt-val" style="color:'+riskColor(risk)+'">'+risk+'</div><div class="mt-lbl">Risk</div></div>'
        + '<div class="meta-tile"><div class="mt-val">'+(p.confidence||'\u2014')+'</div><div class="mt-lbl">Coverage</div></div>'
        + '<div class="meta-tile"><div class="mt-val">'+((p.updatedAt||'').slice(0,10))+'</div><div class="mt-lbl">Updated</div></div>'
        + '</div></div>'

        /* TABS: Rankings / News / Video */
        + '<div class="side-card">'
        + '<div class="tab-bar">'
        + '<button class="tab-btn active" data-tab="rankings">Rankings<span class="tab-count">' + (p.rankings||[]).length + '</span></button>'
        + '<button class="tab-btn" data-tab="news">News<span class="tab-count">' + newsCount + '</span></button>'
        + '<button class="tab-btn" data-tab="video">Video<span class="tab-count">' + videoCount + '</span></button>'
        + '</div>'
        + '<div class="tab-panel active" id="tab-rankings">' + buildRankingsTab(p) + '</div>'
        + '<div class="tab-panel" id="tab-news">' + buildNewsTab(p) + '</div>'
        + '<div class="tab-panel" id="tab-video">' + buildVideoTab(p) + '</div>'
        + '</div>'

        + '</div>' /* /side-col */
        + '</div>' /* /two-col */

        + '<div class="divider"></div>'
        + '<div style="text-align:center;font-family:var(--font-display);font-size:11px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding-bottom:8px;">'
        + 'Brewers Prospect Hub \u00B7 Data synthesized from public scouting sources \u00B7 Not affiliated with MLB'
        + '</div>';

      /* Animate tool bars */
      requestAnimationFrame(() => {
        setTimeout(() => {
          document.querySelectorAll('.tool-fill[data-pct]').forEach(el => {
            el.style.width = el.dataset.pct + '%';
          });
        }, 150);
      });

      /* Tab click handler */
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
      });
    }

  </script>
</body>
</html>
